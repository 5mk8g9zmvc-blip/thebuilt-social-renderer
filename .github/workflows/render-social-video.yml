name: Render five-scene social video

on:
  push:
    branches:
      - main
    paths:
      - render_social.py
      - example-manifest.json
      - .github/workflows/render-social-video.yml
  workflow_dispatch:
    inputs:
      manifest_url:
        description: Public HTTPS URL for the five-scene manifest
        required: false
        type: string
      manifest_json:
        description: Inline five-scene manifest JSON supplied by n8n
        required: false
        type: string
      output_name:
        description: Output filename without extension
        required: true
        default: social-video
        type: string
      resumeUrl:
        description: n8n resume webhook injected by the GitHub dispatch-and-wait node
        required: false
        type: string

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out renderer
        uses: actions/checkout@v4

      - name: Install portable FFmpeg
        run: |
          npm install --no-save @ffmpeg-installer/ffmpeg @ffprobe-installer/ffprobe
          mkdir -p "$HOME/.local/bin"
          ln -sf "$GITHUB_WORKSPACE/node_modules/@ffmpeg-installer/linux-x64/ffmpeg" "$HOME/.local/bin/ffmpeg"
          ln -sf "$GITHUB_WORKSPACE/node_modules/@ffprobe-installer/linux-x64/ffprobe" "$HOME/.local/bin/ffprobe"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/ffmpeg" -version
          "$HOME/.local/bin/ffprobe" -version
          test -f /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf

      - name: Prepare push smoke-test assets
        if: ${{ inputs.manifest_url == '' && inputs.manifest_json == '' }}
        run: |
          mkdir -p assets
          colours=(243447 3A506B 2F4858 463F3A 111111)
          for index in 1 2 3 4 5; do
            number=$(printf '%02d' "$index")
            colour=${colours[$((index - 1))]}
            ffmpeg -hide_banner -loglevel error -y -f lavfi -i "color=c=0x${colour}:s=1080x1920" -frames:v 1 "assets/scene-${number}.jpg"
            ffmpeg -hide_banner -loglevel error -y -f lavfi -i "sine=frequency=$((360 + index * 55)):duration=$((2 + index))" -c:a libmp3lame -b:a 128k "assets/scene-${number}.mp3"
          done

      - name: Prepare inline n8n manifest
        if: ${{ inputs.manifest_json != '' }}
        env:
          MANIFEST_JSON: ${{ inputs.manifest_json }}
        run: printf '%s' "$MANIFEST_JSON" > runtime-manifest.json

      - name: Render and validate
        id: render
        continue-on-error: true
        env:
          MANIFEST_URL: ${{ inputs.manifest_json != '' && 'runtime-manifest.json' || inputs.manifest_url || 'example-manifest.json' }}
          OUTPUT_NAME: ${{ inputs.output_name || 'smoke-test' }}
        run: |
          mkdir -p output
          python3 render_social.py "$MANIFEST_URL" "output/${OUTPUT_NAME}.mp4" --report "output/${OUTPUT_NAME}.report.json"

      - name: Upload validated render
        id: upload
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_name || 'smoke-test' }}
          path: output/
          if-no-files-found: error
          retention-days: 3

      - name: Resume n8n workflow
        if: ${{ always() && inputs.resumeUrl != '' }}
        env:
          RESUME_URL: ${{ inputs.resumeUrl }}
          RENDER_OUTCOME: ${{ steps.render.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          OUTPUT_NAME: ${{ inputs.output_name || 'social-video' }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          status=failure
          if [ "$RENDER_OUTCOME" = success ] && [ "$UPLOAD_OUTCOME" = success ]; then status=success; fi
          callback=(
            --fail-with-body
            --retry 3
            --request POST
            --form "status=$status"
            --form "render_outcome=$RENDER_OUTCOME"
            --form "upload_outcome=$UPLOAD_OUTCOME"
            --form "artifact_id=$ARTIFACT_ID"
            --form "artifact_url=$ARTIFACT_URL"
            --form "output_name=$OUTPUT_NAME"
            --form "run_id=$RUN_ID"
            --form "repository=$REPOSITORY"
            --form "voice_provider=ElevenLabs"
            --form "scene_count=5"
            --form "image_count=5"
            --form "voiceover_count=5"
          )
          if [ "$status" = success ]; then
            base64 --wrap=0 "output/${OUTPUT_NAME}.mp4" > "output/${OUTPUT_NAME}.mp4.b64"
            callback+=(
              --form "mp4_base64=<output/${OUTPUT_NAME}.mp4.b64"
              --form "validation_report=<output/${OUTPUT_NAME}.report.json"
            )
          fi
          curl "${callback[@]}" "$RESUME_URL"

      - name: Fail unsuccessful render
        if: ${{ steps.render.outcome != 'success' || steps.upload.outcome != 'success' }}
        run: exit 1
